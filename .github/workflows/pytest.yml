name: Test Data Sheet AI Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: CSV Loader Tests
        run: pytest csv_loader_test.py

      - name: Run coverage
        run: |
          coverage run -m pytest
          coverage report
